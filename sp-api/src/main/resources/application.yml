# 項目相關配置
sp:
  # 名稱
  name: sp
  # 版本
  version: 0.0.0
  # 版權年份
  copyrightYear: 2025
  # 實例演示開關
  demoEnabled: true
  # 文件路徑 示例（Windows 配置 D:/uploadPath，Linux 配置 /home/uploadPath）
  profile: C:/uploadPath
  # 獲取 ip地址開關
  addressEnabled: false

# 開發環境配置
server:
  # 服務器的 HTTP 端口，默認為 80
  port: 80
  servlet:
    # 應用的訪問路徑
    context-path: /
  tomcat:
    # tomcat 的 URI 編碼
    uri-encoding: UTF-8
    # 連接數滿後的排隊數，默認為 100
    accept-count: 1000
    threads:
      # tomcat 最大線程數，默認為 200
      max: 800
      # Tomcat 啟動初始化的線程數，默認值 10
      min-spare: 100
 
# 用戶配置
user:
  password:
    # 密碼錯誤{maxRetryCount}次鎖定 10 分鐘
    maxRetryCount: 5
  # 首頁地址
  indexUrl: /index

# Spring 配置
spring:
  # 模板引擎
  thymeleaf:
    mode: HTML
    encoding: utf-8
    # 禁用緩存
    cache: false
  # 資源信息
  messages:
    # 國際化資源文件路徑
    basename: static/i18n/messages
  jackson:
    time-zone: GMT+8
    date-format: yyyy-MM-dd HH:mm:ss
  profiles:
    # 默認使用開發環境配置（不啟用 logback）
    active: dev
  # 文件上傳
  servlet:
    multipart:
      # 單個文件大小
      max-file-size: 10MB
      # 設置總上傳的文件大小
      max-request-size: 20MB
  # 服務模塊
  devtools:
    restart:
      # 熱部署開關
      enabled: true

# MyBatis
mybatis:
  # 搜索指定包別名
  typeAliasesPackage: com.sp.**.entity,com.sp.**.domain
  # 配置 mapper 的掃描，找到所有的 mapper.xml 映射文件
  mapperLocations: classpath*:mapper/**/*Mapper.xml
  # 加載全局的配置文件
  configLocation: classpath:mybatis/mybatis-config.xml

# PageHelper 分頁插件
pagehelper:
  helperDialect: mysql
  supportMethodsArguments: true
  params: count=countSql

# 防止 XSS 攻擊
xss:
  # 过滤开关
  enabled: true
  # 排除連結（多個用逗號分隔）
  excludes: /system/notice/*
  # 匹配連結
  urlPatterns: /system/*,/monitor/*,/tool/*

# 防止 csrf 攻擊
csrf:
  # 过滤开关
  enabled: false
  # 白名單（多個用逗號分隔）
  whites: /druid

# Swagger 配置
swagger:
  # 是否開啟 swagger
  enabled: true